services:
  gluetun:
    image: qdm12/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080" # Map the koma web UI port through gluetun!
    networks:
      - koma-net
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=amneziawg
      - AMNEZIAWG_PRIVATE_KEY=${VPN_PRIVATE_KEY}
      - AMNEZIAWG_ADDRESSES=${VPN_ADDRESS}
      - AMNEZIAWG_PUBLIC_KEY=${VPN_PUBLIC_KEY}
      - AMNEZIAWG_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - AMNEZIAWG_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - AMNEZIAWG_PRESHARED_KEY=${VPN_PRESHARED_KEY}
      - AMNEZIAWG_JC=${VPN_JC}
      - AMNEZIAWG_JMIN=${VPN_JMIN}
      - AMNEZIAWG_JMAX=${VPN_JMAX}
      - AMNEZIAWG_S1=${VPN_S1}
      - AMNEZIAWG_S2=${VPN_S2}
      - AMNEZIAWG_H1=${VPN_H1}
      - AMNEZIAWG_H2=${VPN_H2}
      - AMNEZIAWG_H3=${VPN_H3}
      - AMNEZIAWG_H4=${VPN_H4}
      - AMNEZIAWG_PERSISTENT_KEEPALIVE_INTERVAL=${VPN_PERSISTENT_KEEPALIVE}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    network_mode: "service:gluetun" # Route traffic through Gluetun
    depends_on:
      - gluetun
      - docling-serve
    volumes:
      # Bind-mount directories from the repository root
      - ./input:/app/input
      - ./processing:/app/processing
      - ./results:/app/results
      - ./templates:/app/templates
      - ./main.py:/app/main.py
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./schemas:/app/schemas

      # Persistent SQLite DB for users/data
      - app_data:/app/data

      # Hot-reload: mount web app source so edits work immediately without rebuilding
      - ./web/app:/app/app

    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-FALSE}
      - DB_PATH=/app/data/users.db
      - DATA_DIR=/app/data
      - PROJECT_ROOT=/app
      - STORAGE_SECRET=${STORAGE_SECRET:-timplan-secret-key-change-me}
      - NICEGUI_RELOAD=true
      - DOCLING_SERVE_URL=http://docling-serve:5001

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: docling-serve
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - koma-net

volumes:
  app_data:
    driver: local

networks:
  koma-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1280"
